html{background:#06080f;}
body{background:var(--bg);min-height:100vh;font-family:'DM Sans',system-ui,sans-serif;color:var(--txt);-webkit-font-smoothing:antialiased;}
.app{max-width:680px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
.hdr{padding:14px 18px 11px;padding-top:max(14px,env(safe-area-inset-top));background:linear-gradient(160deg,#0d1828,#06080f);border-bottom:1px solid var(--b0);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;z-index:100;}

function saveToCloud(){
  setSS('saving');

/* ── Date helpers ── */
function fmt(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}).toUpperCase();}
function fmtFull(d){return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});}
function fmtS(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}).toUpperCase();}
function sameDay(a,b){return a.getFullYear()==b.getFullYear()&&a.getMonth()==b.getMonth()&&a.getDate()==b.getDate();}
function pid(cad,d){if(!d)d=N;var y=d.getFullYear(),m=d.getMonth();if(cad=='monthly')return y+'-'+(m<9?'0':'')+(m+1);if(cad=='quarterly')return y+'-Q'+(Math.floor(m/3)+1);if(cad=='semi')return y+'-H'+(m<6?'1':'2');if(cad=='annual')return''+y;return'ONCE';}
function pl(cad){var m=N.getMonth(),y=N.getFullYear(),mn=['January','February','March','April','May','June','July','August','September','October','November','December'];if(cad=='monthly')return mn[m]+' '+y;var qn=['Jan-Mar','Apr-Jun','Jul-Sep','Oct-Dec'];if(cad=='quarterly')return'Q'+(Math.floor(m/3)+1)+' '+y+' \xb7 '+qn[Math.floor(m/3)];if(cad=='semi')return m<6?'H1 '+y+' \xb7 Jan-Jun':'H2 '+y+' \xb7 Jul-Dec';return''+y;}
function dl(cad){var y=N.getFullYear(),m=N.getMonth(),e;if(cad=='monthly')e=new Date(y,m+1,0);else if(cad=='quarterly')e=new Date(y,(Math.floor(m/3)+1)*3,0);else if(cad=='semi')e=m<6?new Date(y,6,0):new Date(y,12,0);else e=new Date(y,12,0);return Math.max(0,Math.ceil((e-N)/86400000));}

/* ── Credit period logic (auto-resets by period) ── */
function isOn(id,cad){
  if(!checks[id])return false;
  if(cad=='once')return true;
  return pid(cad,new Date(checks[id]))==pid(cad);
}

/* ── Bill logic (day-based reset) ── */
function bKey(id){return'bill_'+id;}
function billActive(id){var k=bKey(id);if(!checks[k])return false;return sameDay(new Date(checks[k]),N);}
function billPaidDate(id){var k=bKey(id);if(!checks[k])return null;return new Date(checks[k]);}
function togBill(id){var k=bKey(id);if(billActive(id)){delete checks[k];}else{checks[k]=new Date().toISOString();}debounceSave();render();}
function resetBill(id){delete checks[bKey(id)];debounceSave();render();}

/* ── Toggle credits ── */
function tog(id,cad){if(isOn(id,cad)){delete checks[id];}else{checks[id]=new Date().toISOString();}debounceSave();render();}
function st(t){tab=t;for(var i=0;i<TABS.length;i++){var el=document.getElementById('t'+i);if(el)el.className='tab'+(TABS[i]==t?' on':'');}render();}

/* ── Shared UI builders ── */
function pills(c){
  var h='';
  if(c.card=='amex')h+='<span class="pill pa">AMEX</span>';
  else if(c.card=='chase')h+='<span class="pill pc">CHASE</span>';
  else h+='<span class="pill ppers">PERSONAL</span>';
  if(c.auto)h+='<span class="pill pauto">Auto</span>';
  if(c.urg)h+='<span class="pill pwarn">Action needed</span>';
  if(c.last)h+='<span class="pill pdead">Last ever</span>';
  if(c.skip)h+='<span class="pill pskip">Skip for now</span>';
  if(c.done)h+='<span class="pill pdone">Redeemed</span>';
  return h;
}
function barcls(c,cad){if(isOn(c.id,cad))return'bar bon';if(c.card=='amex')return'bar ba';if(c.card=='chase')return'bar bc';return'bar bp';}
function chkh(c,cad){
  var on=isOn(c.id,cad);
  return'<div class="chk'+(on?' on':'')+'" onclick="tog(\''+c.id+'\',\''+cad+'\')">'+(on?'&#10003;':'')+'</div>';
}
function crdcls(c,cad){
  var cl='crd';
  if(c.done||c.skip)cl+=c.done?' done':' skip';
  else if(isOn(c.id,cad))cl+=' ison';
  else if(c.last)cl+=' dcrd';
  else if(c.urg)cl+=' wcrd';
  return cl;
}
/* ── Main credit card row — includes undo when checked ── */
function cH(c,cad){
  var on=isOn(c.id,cad);
  var p=pl(cad).split('\xb7')[0].trim();
  var undoHtml=on?'<div class="undo-btn" onclick="tog(\''+c.id+'\',\''+cad+'\')">&#8629; undo</div>':'';
  return'<div class="'+crdcls(c,cad)+'"><div class="'+barcls(c,cad)+'"></div><div class="crow">'+chkh(c,cad)+'<div class="ci"><div class="ptags">'+pills(c)+'</div><div class="cn">'+c.name+'</div><div class="cd">'+c.detail+'</div>'+undoHtml+'</div><div class="cm"><div class="cv">'+(c.val||'')+'</div><div class="cr">'+p+'</div></div></div></div>';
}

    h+='<div class="chk'+(active?' on':'')+'" onclick="togBill(\''+b.id+'\')">'+(active?'&#10003;':'')+'</div>';
    h+='<div class="binfo"><div class="bname">'+b.name+'</div><div class="bwho">'+sub+'</div>';
    if(active){h+='<div class="bpaid-note">&#10003; PAID &mdash; '+fmtFull(pd)+'</div><span class="breset" onclick="resetBill(\''+b.id+'\')">&#8629; undo / wrong card</span>';}
    else if(paidPrev){h+='<div class="bprev-note">Last paid: '+fmtFull(pd)+'</div><span class="breset" onclick="resetBill(\''+b.id+'\')">&#8629; clear record</span>';}
    h+='</div><div class="bstat"><div class="bdue '+dc+'">'+ds+'</div></div></div></div>';
  }
  h+='<div class="ri">Tap to mark paid &mdash; shows full date and stays green today only. After midnight the checkmark clears but the date record stays as a reference. Use &ldquo;undo / wrong card&rdquo; immediately to reverse an accidental tap.</div>';
  return h;
}

function addOffer(){var n=document.getElementById('oname'),c=document.getElementById('ocard'),cb=document.getElementById('ocb'),e=document.getElementById('oexp');if(!n||!e||!n.value.trim()||!e.value)return;offers.push({id:''+Date.now(),name:n.value.trim(),card:c.value,cb:cb.value.trim()||'See offer',expiry:e.value});debounceSave();n.value='';cb.value='';e.value='';render();}
function delOffer(id){offers=offers.filter(function(o){return o.id!=id;});debounceSave();render();}
function initDoneItems(){
  // Pre-seed done items as checked for current year so they show green by default
  // Tony can click to undo any of them — they are NOT locked
  var yr=N.getFullYear();
  var doneItems=CR.annual.filter(function(c){return c.done;});
  for(var i=0;i<doneItems.length;i++){
    var c=doneItems[i];
    if(!checks[c.id]){
      // Mark as checked on Jan 1 of current year — isOn('annual') will return true
      checks[c.id]=new Date(yr,0,1,12,0,0).toISOString();
    }
  }
}
function render(){var el=document.getElementById('pg');if(!el)return;try{var fns={dash:rDash,monthly:rMonthly,quarterly:rQuarterly,semi:rSemi,annual:rAnnual,offers:rOffers,bills:rBills};el.innerHTML=(fns[tab]||rDash)();}catch(err){el.innerHTML='<div class="empty" style="color:#f87171;">Error: '+err.message+'</div>';}}

try{document.getElementById('hdate').textContent=fmt(N);}catch(e){}
loadFromCloud(function(){initDoneItems();render();});
</script>
